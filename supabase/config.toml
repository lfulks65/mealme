# ============================================================================
# MealMe — Supabase CLI Configuration
# ============================================================================
# Docs: https://supabase.com/docs/guides/local-development
# ============================================================================

project_id = "mealme"

# ----------------------------------------------------------------------------
# API (PostgREST)
# ----------------------------------------------------------------------------
[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

# ----------------------------------------------------------------------------
# Database
# ----------------------------------------------------------------------------
[db]
port = 54322

# ----------------------------------------------------------------------------
# Studio
# ----------------------------------------------------------------------------
[studio]
port = 54323

# ----------------------------------------------------------------------------
# Auth
# ----------------------------------------------------------------------------
[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "mealme://auth/callback",
  "com.mealme.app://auth/callback",
  "https://mealme.app/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

# ----------------------------------------------------------------------------
# Auth — Email provider
# ----------------------------------------------------------------------------
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# ----------------------------------------------------------------------------
# Auth — Google OAuth
# ----------------------------------------------------------------------------
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
skip_nonce_check = true

# ----------------------------------------------------------------------------
# Auth — Apple OAuth
# ----------------------------------------------------------------------------
[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"
redirect_uri = ""

# ----------------------------------------------------------------------------
# Auth — Rate limiting
# ----------------------------------------------------------------------------
[auth.rate_limit]
email_sent = 5
sms_sent = 5
anonymous_users = 30
token_refresh = 100

# ----------------------------------------------------------------------------
# Storage
# ----------------------------------------------------------------------------
[storage]
file_size_limit = "50MiB"

# ----------------------------------------------------------------------------
# Analytics
# ----------------------------------------------------------------------------
[analytics]
enabled = true
port = 54327
